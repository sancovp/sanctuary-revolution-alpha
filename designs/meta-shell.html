<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SANCREV OPERA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════
           Meta-Shell: toolbar + webview wrapper
           The entire app runs INSIDE the webview.
           This shell controls reload, errors, and agent chat.
           ═══════════════════════════════════════════════════ */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #08060d;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #c4b5d0;
            -webkit-app-region: drag; /* Allow dragging from toolbar */
        }

        .meta-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* ── Toolbar ─────────────────────────────── */

        .meta-toolbar {
            height: 38px;
            min-height: 38px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            padding-left: 78px; /* space for macOS traffic lights */
            background: linear-gradient(180deg, #16111f 0%, #0e0a15 100%);
            border-bottom: 1px solid #2a1f3d;
            -webkit-app-region: drag;
            z-index: 100;
            flex-shrink: 0;
        }

        .meta-toolbar button,
        .meta-toolbar select {
            -webkit-app-region: no-drag;
        }

        .meta-title {
            font-size: 11px;
            font-weight: 600;
            color: #8b7aa0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .meta-url-bar {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #1f1630;
            border-radius: 6px;
            padding: 0 10px;
            height: 26px;
            min-width: 0;
        }

        .meta-url {
            font-size: 11px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #5a4d6a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .meta-url .meta-url-host {
            color: #8b7aa0;
        }

        .meta-btn {
            width: 28px;
            height: 26px;
            border-radius: 5px;
            border: 1px solid #2a1f3d;
            background: rgba(255, 255, 255, 0.03);
            color: #8b7aa0;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.12s;
            flex-shrink: 0;
            -webkit-app-region: no-drag;
        }

        .meta-btn:hover {
            background: rgba(124, 58, 237, 0.15);
            border-color: #3d2a5c;
            color: #c4a0ff;
        }

        .meta-btn.active {
            background: rgba(124, 58, 237, 0.2);
            border-color: rgba(124, 58, 237, 0.4);
            color: #a78bfa;
        }

        .meta-btn-wide {
            width: auto;
            padding: 0 10px;
            gap: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        /* Error badge */
        .meta-error-badge {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 0 8px;
            height: 22px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.12s;
            flex-shrink: 0;
            -webkit-app-region: no-drag;
        }

        .meta-error-badge:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .meta-error-badge.clear {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        /* Status dot */
        .meta-status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .meta-status-dot.connected {
            background: #4ade80;
            box-shadow: 0 0 6px rgba(74, 222, 128, 0.5);
        }

        .meta-status-dot.loading {
            background: #fbbf24;
            animation: meta-pulse 1s infinite;
        }

        .meta-status-dot.error {
            background: #f87171;
        }

        @keyframes meta-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Error Console ────────────────────────── */

        .meta-error-console {
            background: linear-gradient(180deg, #1a0a0a 0%, #0d0608 100%);
            border-bottom: 1px solid rgba(239, 68, 68, 0.2);
            max-height: 180px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 11px;
            padding: 8px 12px;
            flex-shrink: 0;
        }

        .meta-error-console::-webkit-scrollbar { width: 4px; }
        .meta-error-console::-webkit-scrollbar-thumb { background: rgba(239, 68, 68, 0.3); border-radius: 2px; }

        .meta-error-line {
            padding: 3px 0;
            color: #f87171;
            border-bottom: 1px solid rgba(239, 68, 68, 0.05);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .meta-error-line .error-time {
            color: #6b4040;
            margin-right: 8px;
        }

        .meta-error-clear {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 8px;
            border-radius: 3px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.08);
            color: #f87171;
            font-size: 10px;
            cursor: pointer;
        }

        .meta-error-clear:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        /* ── Chat Panel (side) ────────────────────── */

        .meta-body {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .meta-webview-container {
            flex: 1;
            min-width: 0;
            position: relative;
        }

        .meta-webview-container webview {
            width: 100%;
            height: 100%;
            border: none;
        }

        .meta-chat-panel {
            width: 380px;
            min-width: 280px;
            max-width: 50vw;
            background: linear-gradient(180deg, #12101a 0%, #0a0810 100%);
            border-left: 1px solid #2a1f3d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .meta-chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .meta-chat-header-title {
            font-size: 12px;
            font-weight: 600;
            color: #a78bfa;
        }

        .meta-chat-body {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Loading Overlay ──────────────────────── */

        .meta-loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #08060d;
            z-index: 50;
            transition: opacity 0.3s;
        }

        .meta-loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .meta-loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #2a1f3d;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: meta-spin 0.8s linear infinite;
        }

        .meta-loading-text {
            margin-top: 12px;
            font-size: 12px;
            color: #5a4d6a;
        }

        @keyframes meta-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="meta-shell">
        <!-- ═══ Toolbar ═══ -->
        <div class="meta-toolbar">
            <span class="meta-title">SANCREV</span>

            <!-- Navigation -->
            <button class="meta-btn" id="btn-back" title="Back">◀</button>
            <button class="meta-btn" id="btn-forward" title="Forward">▶</button>
            <button class="meta-btn" id="btn-reload" title="Reload (Cmd+R)">🔄</button>

            <!-- URL bar -->
            <div class="meta-url-bar">
                <div class="meta-status-dot loading" id="status-dot"></div>
                <div class="meta-url" id="url-display">
                    <span class="meta-url-host">loading...</span>
                </div>
            </div>

            <!-- Error badge -->
            <div class="meta-error-badge clear" id="error-badge">
                <span>✓</span> <span id="error-count">0</span>
            </div>

            <!-- Chat toggle -->
            <button class="meta-btn meta-btn-wide" id="btn-chat" title="Toggle Agent Chat (Ctrl+\\)">
                🌌 Chat
            </button>

            <!-- DevTools -->
            <button class="meta-btn" id="btn-devtools" title="Open DevTools for inner app">🔧</button>
        </div>

        <!-- ═══ Error Console (hidden by default) ═══ -->
        <div class="meta-error-console" id="error-console" style="display: none;"></div>

        <!-- ═══ Body: webview + optional chat panel ═══ -->
        <div class="meta-body">
            <div class="meta-webview-container">
                <webview
                    id="app-webview"
                    src="about:blank"
                    preload=""
                    nodeintegration
                    webpreferences="contextIsolation=false"
                    style="width: 100%; height: 100%;"
                ></webview>

                <!-- Loading overlay -->
                <div class="meta-loading-overlay" id="loading-overlay">
                    <div class="meta-loading-spinner"></div>
                    <div class="meta-loading-text">Loading SANCREV OPERA...</div>
                </div>
            </div>

            <!-- Chat panel (initially hidden) -->
            <div class="meta-chat-panel" id="chat-panel" style="display: none;">
                <div class="meta-chat-header">
                    <span class="meta-chat-header-title">🎼 Agent Chat</span>
                    <button class="meta-btn" id="btn-close-chat" style="width: 22px; height: 22px; font-size: 11px;">✕</button>
                </div>
                <div class="meta-chat-body" id="chat-body">
                    <!-- Chat iframe loads the conductor chat component -->
                    <iframe
                        id="chat-iframe"
                        src="about:blank"
                        style="width: 100%; height: 100%; border: none; background: transparent;"
                    ></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════
        // Meta-Shell Controller
        // ═══════════════════════════════════════════════════

        const webview = document.getElementById('app-webview');
        const statusDot = document.getElementById('status-dot');
        const urlDisplay = document.getElementById('url-display');
        const errorBadge = document.getElementById('error-badge');
        const errorCount = document.getElementById('error-count');
        const errorConsole = document.getElementById('error-console');
        const loadingOverlay = document.getElementById('loading-overlay');
        const chatPanel = document.getElementById('chat-panel');

        let errors = [];
        let chatVisible = false;

        // ── Determine app URL ─────────────────────────
        // In dev: Vite dev server. In prod: file protocol.
        // The electron main process will tell us via a data attribute.
        const appUrl = document.body.dataset.appUrl || 'http://localhost:5173';

        // ── Load the app into the webview ─────────────
        webview.addEventListener('dom-ready', () => {
            statusDot.className = 'meta-status-dot connected';
            urlDisplay.innerHTML = `<span class="meta-url-host">${webview.getURL()}</span>`;
            loadingOverlay.classList.add('hidden');

            // Inject error catcher into the webview
            webview.executeJavaScript(`
                window.addEventListener('error', (e) => {
                    window.postMessage({
                        type: 'META_SHELL_ERROR',
                        message: e.message,
                        filename: e.filename,
                        lineno: e.lineno,
                        colno: e.colno,
                    }, '*');
                });
                window.addEventListener('unhandledrejection', (e) => {
                    window.postMessage({
                        type: 'META_SHELL_ERROR',
                        message: 'Unhandled Promise Rejection: ' + (e.reason?.message || e.reason || 'unknown'),
                    }, '*');
                });
            `);
        });

        webview.addEventListener('did-start-loading', () => {
            statusDot.className = 'meta-status-dot loading';
            loadingOverlay.classList.remove('hidden');
        });

        webview.addEventListener('did-stop-loading', () => {
            statusDot.className = 'meta-status-dot connected';
            loadingOverlay.classList.add('hidden');
        });

        webview.addEventListener('did-fail-load', (e) => {
            if (e.errorCode === -3) return; // Aborted load (navigation)
            statusDot.className = 'meta-status-dot error';
            addError(`Load failed: ${e.errorDescription} (${e.validatedURL})`);
        });

        webview.addEventListener('did-navigate', () => {
            urlDisplay.innerHTML = `<span class="meta-url-host">${webview.getURL()}</span>`;
        });

        // Capture console errors from webview
        webview.addEventListener('console-message', (e) => {
            if (e.level === 3) { // Error level
                addError(e.message);
            }
        });

        // Listen for postMessage from webview (error reports)
        webview.addEventListener('ipc-message', (e) => {
            if (e.channel === 'meta-error') {
                addError(e.args[0]);
            }
        });

        // ── Error tracking ────────────────────────────
        function addError(msg) {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            errors.push({ time, msg });
            errorCount.textContent = errors.length;
            errorBadge.className = 'meta-error-badge';
            errorBadge.innerHTML = `<span>⚠</span> <span id="error-count">${errors.length}</span>`;

            // Update console if visible
            if (errorConsole.style.display !== 'none') {
                renderErrors();
            }
        }

        function renderErrors() {
            errorConsole.innerHTML = errors.map(e =>
                `<div class="meta-error-line"><span class="error-time">${e.time}</span>${escapeHtml(e.msg)}</div>`
            ).join('') + (errors.length > 0 ? '<button class="meta-error-clear" onclick="clearErrors()">Clear</button>' : '');
        }

        function clearErrors() {
            errors = [];
            errorCount.textContent = '0';
            errorBadge.className = 'meta-error-badge clear';
            errorBadge.innerHTML = '<span>✓</span> <span id="error-count">0</span>';
            errorConsole.style.display = 'none';
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ── Button handlers ───────────────────────────
        document.getElementById('btn-back').onclick = () => webview.canGoBack() && webview.goBack();
        document.getElementById('btn-forward').onclick = () => webview.canGoForward() && webview.goForward();
        document.getElementById('btn-reload').onclick = () => webview.reload();
        document.getElementById('btn-devtools').onclick = () => {
            if (webview.isDevToolsOpened()) {
                webview.closeDevTools();
            } else {
                webview.openDevTools();
            }
        };

        errorBadge.onclick = () => {
            if (errorConsole.style.display === 'none') {
                errorConsole.style.display = '';
                renderErrors();
            } else {
                errorConsole.style.display = 'none';
            }
        };

        // Chat toggle
        function toggleChat() {
            chatVisible = !chatVisible;
            chatPanel.style.display = chatVisible ? '' : 'none';
            document.getElementById('btn-chat').classList.toggle('active', chatVisible);
        }

        document.getElementById('btn-chat').onclick = toggleChat;
        document.getElementById('btn-close-chat').onclick = toggleChat;

        // ── Keyboard shortcuts ────────────────────────
        document.addEventListener('keydown', (e) => {
            // Cmd+R / Ctrl+R: reload webview
            if ((e.metaKey || e.ctrlKey) && e.key === 'r') {
                e.preventDefault();
                webview.reload();
            }
            // Ctrl+\: toggle chat
            if (e.ctrlKey && e.key === '\\') {
                e.preventDefault();
                toggleChat();
            }
            // Cmd+Shift+I: devtools
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'I') {
                e.preventDefault();
                if (webview.isDevToolsOpened()) {
                    webview.closeDevTools();
                } else {
                    webview.openDevTools();
                }
            }
        });

        // ── Load the app ──────────────────────────────
        webview.src = appUrl;
    </script>
</body>
</html>
