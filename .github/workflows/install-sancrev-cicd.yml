name: Install SANCREV CI/CD
# Run this workflow ONCE to inject SANCREV CI/CD into your repo.
# After running, the workflows will be committed and active.
# You can delete this file after setup is complete.

on:
  workflow_dispatch:
    inputs:
      build_targets:
        description: 'Build targets (comma-separated: mac,win,linux)'
        required: false
        default: 'mac'
        type: string
      vite_port:
        description: 'Vite dev server port'
        required: false
        default: '5173'
        type: string
      inner_app_dir:
        description: 'Inner app source directory'
        required: false
        default: 'src/'
        type: string

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch SANCREV CI/CD workflows
        run: |
          echo "📥 Fetching SANCREV CI/CD from sancovp/sancrev-cicd..."
          
          REPO="sancovp/sancrev-cicd"
          BRANCH="main"
          BASE_URL="https://raw.githubusercontent.com/$REPO/$BRANCH"
          
          mkdir -p .github/workflows
          
          # Download workflow files
          curl -sL "$BASE_URL/.github/workflows/build-shell.yml" \
            -o .github/workflows/build-shell.yml
          curl -sL "$BASE_URL/.github/workflows/validate-inner-app.yml" \
            -o .github/workflows/validate-inner-app.yml
          curl -sL "$BASE_URL/.github/workflows/package-inner-app.yml" \
            -o .github/workflows/package-inner-app.yml
          
          echo "✅ Downloaded 3 workflow files"

      - name: Generate .sancrev.yml
        run: |
          cat > .sancrev.yml << 'HEREDOC'
          # SANCREV OPERA Configuration
          # Generated by install-sancrev-cicd workflow
          # Docs: https://github.com/sancovp/sancrev-cicd
          
          sancrev:
            version: 1
            
            shell:
              electron-dir: electron/
              meta-shell: meta-shell.html
              build-targets: [${{ inputs.build_targets }}]
            
            inner-app:
              source-dir: ${{ inputs.inner_app_dir }}
              entry: index.html
              vite-config: vite.config.ts
              vite-port: ${{ inputs.vite_port }}
            
            versioning:
              strategy: semver
              side-by-side: true
              auto-update: false
          HEREDOC
          
          echo "✅ Generated .sancrev.yml"

      - name: Commit and push
        run: |
          git config user.name "SANCREV CI"
          git config user.email "ci@sancrev.dev"
          git add .github/workflows/build-shell.yml \
                  .github/workflows/validate-inner-app.yml \
                  .github/workflows/package-inner-app.yml \
                  .sancrev.yml
          git commit -m "ci: install SANCREV CI/CD workflows

          Installed from sancovp/sancrev-cicd.
          
          Workflows:
          - build-shell.yml: builds Electron shell on shell changes
          - validate-inner-app.yml: validates React source on src/ changes  
          - package-inner-app.yml: packages source for prod hot mode
          
          Config: .sancrev.yml"
          git push

      - name: Summary
        run: |
          echo "## ✅ SANCREV CI/CD Installed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Three workflows have been committed to your repo:" >> $GITHUB_STEP_SUMMARY
          echo "1. **build-shell.yml** — triggers on electron/ changes" >> $GITHUB_STEP_SUMMARY
          echo "2. **validate-inner-app.yml** — triggers on src/ changes" >> $GITHUB_STEP_SUMMARY
          echo "3. **package-inner-app.yml** — manual/release trigger" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Config: \`.sancrev.yml\` (edit to customize)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "You can now safely delete this \`install-sancrev-cicd.yml\` workflow." >> $GITHUB_STEP_SUMMARY
