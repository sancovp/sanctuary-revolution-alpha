# ============================================
# HEAVEN SWARM — tmux config for agent teams
# ============================================

# ----- STATUS BAR: ON (show team layout) -----
set -g status on
set -g status-style "bg=#1a1a2e,fg=#e0e0e0"
set -g status-left "#[fg=#00d4ff,bold] 🐝 SWARM: #{session_name} "
set -g status-left-length 40
set -g status-right "#[fg=#888888] %H:%M "
set -g status-right-length 20

# Pane labels in status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#00ff88,bold] #I:#W "

# ----- PANE BORDERS: visible with agent names -----
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#00d4ff"
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "

# ----- INSTANT RESPONSE -----
set -sg escape-time 0

# ----- SCROLLBACK -----
set -g history-limit 100000

# ----- TERMINAL -----
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g focus-events on

# ----- MOUSE -----
set -g mouse on

# ----- SCROLL MODE -----
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= \"#{pane_in_mode}\" \"send-keys -M\" \"copy-mode -e\""
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -T copy-mode-vi q send-keys -X cancel

# ----- RESIZE: tiled layout -----
set -g aggressive-resize off
set -g default-size 200x50

# ----- BASICS -----
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ----- UNICODE -----
set -as terminal-overrides ',*:U8=0'

# ----- QUICK NAVIGATION -----
# Alt+number to jump to pane
bind -n M-1 select-pane -t 1
bind -n M-2 select-pane -t 2
bind -n M-3 select-pane -t 3
bind -n M-4 select-pane -t 4
bind -n M-5 select-pane -t 5

# ----- RELOAD -----
bind r source-file ~/.tmux.swarm.conf \; display "Swarm config reloaded"
